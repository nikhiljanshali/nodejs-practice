<div class="back-link" (click)="backToList()">
  <i class="bi bi-arrow-left"></i> Back to All Patients
</div>
<form [formGroup]="patientForm" (ngSubmit)="submitUpdate()">
  <div class="card patient-form-card">
    <div class="card-header-custom">
      <div
        style="width:36px;height:36px;border-radius:9px;background:rgba(221,0,49,0.08);display:flex;align-items:center;justify-content:center;">
        <i class="bi bi-plus-circle" style="color:var(--ng-red);font-size:18px;"></i>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;">Update Patient</div>
        <div style="font-size:12px;color:var(--text-muted);">Change in the details below to update a patient</div>
      </div>
      <div style="margin-left:auto;">
        <!-- <span class="ng-tag">CreateTodoComponent</span> -->
      </div>
    </div>
    <div class="card-body-custom">
      <div class="form-section-title">Patient Information</div>

      <div style="display:grid;grid-template-columns: repeat(5, 1fr);gap:16px;">

        <!-- First Name -->
        <div class="form-group-ng">
          <label class="form-label-ng">First Name <span class="required">*</span></label>
          <input type="text" class="form-control-ng" formControlName="firstName" placeholder="Enter first name">
          <div class="form-error"
            *ngIf="patientForm.get('firstName')?.touched && patientForm.get('firstName')?.invalid">
            First Name is required.
          </div>
        </div>

        <!-- Last Name -->
        <div class="form-group-ng">
          <label class="form-label-ng">Last Name <span class="required">*</span></label>
          <input type="text" class="form-control-ng" formControlName="lastName" placeholder="Enter last name">
          <div class="form-error" *ngIf="patientForm.get('lastName')?.touched && patientForm.get('lastName')?.invalid">
            Last Name is required.
          </div>
        </div>

        <!-- Age -->
        <div class="form-group-ng">
          <label class="form-label-ng">Age <span class="required">*</span></label>
          <input type="number" class="form-control-ng" formControlName="age" placeholder="Enter age">
          <div class="form-error" *ngIf="patientForm.get('age')?.touched && patientForm.get('age')?.invalid">
            Age is required.
          </div>
        </div>

        <!-- Gender (Radio) -->
        <div class="form-group-ng">
          <label class="form-label-ng">Gender <span class="required">*</span></label>
          <div class="radio-group">
            <label class="radio-card">
              <input type="radio" value="Male" formControlName="gender">
              <span>Male</span>
            </label>

            <label class="radio-card">
              <input type="radio" value="Female" formControlName="gender">
              <span>Female</span>
            </label>

            <label class="radio-card">
              <input type="radio" value="Other" formControlName="gender">
              <span>Other</span>
            </label>
          </div>
          <div class="form-error" *ngIf="patientForm.get('gender')?.touched && patientForm.get('gender')?.invalid">
            Gender is required.
          </div>
        </div>

        <!-- Date of Birth -->
        <div class="form-group-ng">
          <label class="form-label-ng">Date of Birth <span class="required">*</span></label>
          <input type="date" class="form-control-ng" formControlName="dateofBirth">
          <div class="form-error"
            *ngIf="patientForm.get('dateofBirth')?.touched && patientForm.get('dateofBirth')?.invalid">
            Date of Birth is required.
          </div>
        </div>

        <!-- Email -->
        <div class="form-group-ng" style="grid-column: 1 / -1;">
          <label class="form-label-ng">Email <span class="required">*</span></label>
          <input type="email" class="form-control-ng" formControlName="email" placeholder="Enter email">
          <div class="form-error" *ngIf="patientForm.get('email')?.touched && patientForm.get('email')?.invalid">
            Email is required.
          </div>
        </div>
      </div>
      <div class="form-section-title">Medical Information</div>
      <div style="display:grid;grid-template-columns: repeat(3, 1fr);gap:16px;">

        <!-- Blood Group -->
        <div class="form-group-ng">
          <label class="form-label-ng">Blood Group <span class="required">*</span></label>
          <select class="form-control-ng" formControlName="bloodGroup">
            <option value="">Select Blood Group</option>
            <option *ngFor="let bg of bloodGroups" [value]="bg">{{bg}}</option>
          </select>
        </div>

        <!-- Skin Type -->
        <div class="form-group-ng">
          <label class="form-label-ng">Skin Type <span class="required">*</span></label>
          <select class="form-control-ng" formControlName="skinType">
            <option value="">Select Skin Type</option>
            <option *ngFor="let type of skinTypes" [value]="type">{{type}}</option>
          </select>
        </div>

        <!-- Allergies -->
        <div class="form-group-ng">
          <label class="form-label-ng">Allergies</label>
          <select class="form-control-ng" formControlName="allergies">
            <option value="">Select Allergy</option>
            <option *ngFor="let allergy of allergiesList" [value]="allergy">{{allergy}}</option>
          </select>
        </div>

        <!-- Medication -->
        <div class="form-group-ng">
          <label class="form-label-ng">Medication</label>
          <select class="form-control-ng" formControlName="medication">
            <option value="">Select Medication</option>
            <option *ngFor="let med of medicationsList" [value]="med">{{med}}</option>
          </select>
        </div>

        <!-- Diseases -->
        <div class="form-group-ng">
          <label class="form-label-ng">Diseases</label>
          <select class="form-control-ng" formControlName="diseases">
            <option value="">Select Disease</option>
            <option *ngFor="let dis of diseasesList" [value]="dis">{{dis}}</option>
          </select>
        </div>



      </div>
    </div>
    <div class="card-footer">
      <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:10px;">
        <button type="button" class="btn-ghost" (click)="goBack()">Cancel</button>
        <button type="submit" class="btn-primary-ng">
          <i class="bi bi-check-lg"></i> Save Changes
        </button>
      </div>
    </div>
  </div>
</form>
