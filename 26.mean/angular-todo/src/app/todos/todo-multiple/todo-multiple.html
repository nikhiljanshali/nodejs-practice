<!-- ════════════════════════════════════════
           VIEW: /todos/create  → CreateTodoComponent
      ════════════════════════════════════════ -->
<div class="back-link" (click)="backToList()">
  <i class="bi bi-arrow-left"></i> Back to All Todos
</div>

<form [formGroup]="todoForm" (ngSubmit)="onSubmit()">
  <div class="card">
    <div class="card-header-custom">
      <i class="bi bi-plus-circle" style="color:var(--ng-red);font-size:16px;"></i>
      <div style="font-size:14px;font-weight:600;">Create Multiple Todos</div>

      <div style="margin-left:auto;">
        <button type="button" class="btn btn-sm btn-primary" (click)="addRow()">
          + Add Row
        </button>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table class="todo-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Due Date</th>
            <th>Priority</th>
            <th>Tags</th>
            <th style="text-align: end;">Actions</th>
          </tr>
        </thead>

        <tbody formArrayName="todos">
          <tr *ngFor="let todo of todos.controls; let i = index" [formGroupName]="i">

            <td>{{ i + 1 }}</td>

            <!-- Title -->
            <td>
              <input type="text" class="form-control-ng" formControlName="title" />
            </td>

            <!-- Description -->
            <td>
              <input type="text" class="form-control-ng" formControlName="description" />
            </td>

            <!-- Status Dropdown -->
            <td>
              <select class="form-control-ng" formControlName="status">
                <option value="pending">Pending</option>
                <option value="in-progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </td>

            <!-- Due Date -->
            <td>
              <input type="date" class="form-control-ng" formControlName="dueDate" />
            </td>

            <!-- Priority Dropdown -->
            <td>
              <select class="form-control-ng" formControlName="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </td>

            <!-- Tags -->
            <td>
              <input type="text" class="form-control-ng" formControlName="tags" />
            </td>

            <!-- Actions -->
            <td style="text-align:right;">
              <button type="button" class="btn btn-sm btn-danger" (click)="removeRow(i)">
                Delete
              </button>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

    <!-- Submit Button -->
    <div style="padding:10px; text-align:right;">
      <button type="submit" class="btn btn-sm btn-success">
        Submit Todos
      </button>
    </div>
  </div>
</form>
